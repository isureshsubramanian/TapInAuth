<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph card for tapinauth.io — 1200x630, the canonical OG dimensions.
  Used by Twitter, LinkedIn, Slack, Discord, iMessage when the homepage URL is shared.
  Background: deep navy (matches the executive theme); accent stripe in blue + cyan.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1224"/>
      <stop offset="100%" stop-color="#0F1730"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- top brand stripe -->
  <rect x="0" y="0" width="1200" height="10" fill="url(#accent)"/>

  <!-- logo mark (two-square wordmark) -->
  <g transform="translate(80,80)">
    <rect width="56" height="56" fill="#2563EB"/>
    <rect x="70" width="22" height="56" fill="#22D3EE"/>
    <text x="115" y="40" fill="#F5F7FA" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="1">TapInAuth</text>
  </g>

  <!-- hero text -->
  <text x="80" y="280" fill="#F5F7FA" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="800">Tap to sign in.</text>
  <text x="80" y="340" fill="#22D3EE" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="600">Drop-in passwordless auth for ASP.NET Core &amp; Blazor.</text>

  <!-- feature chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#F5F7FA">
    <g transform="translate(80,400)">
      <rect width="180" height="44" rx="22" fill="#13284A" stroke="#1F2A48" stroke-width="1"/>
      <text x="90" y="29" text-anchor="middle">Passkeys</text>
    </g>
    <g transform="translate(275,400)">
      <rect width="180" height="44" rx="22" fill="#13284A" stroke="#1F2A48" stroke-width="1"/>
      <text x="90" y="29" text-anchor="middle">Magic links</text>
    </g>
    <g transform="translate(470,400)">
      <rect width="180" height="44" rx="22" fill="#13284A" stroke="#1F2A48" stroke-width="1"/>
      <text x="90" y="29" text-anchor="middle">Email + SMS OTP</text>
    </g>
    <g transform="translate(700,400)">
      <rect width="180" height="44" rx="22" fill="#13284A" stroke="#1F2A48" stroke-width="1"/>
      <text x="90" y="29" text-anchor="middle">Recovery codes</text>
    </g>
    <g transform="translate(900,400)">
      <rect width="180" height="44" rx="22" fill="#13284A" stroke="#1F2A48" stroke-width="1"/>
      <text x="90" y="29" text-anchor="middle">Multi-tenant</text>
    </g>
  </g>

  <!-- bottom URL + license badges -->
  <text x="80" y="560" fill="#8B95AD" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">tapinauth.io</text>
  <g transform="translate(960,540)" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">
    <rect width="68" height="28" rx="6" fill="#10B981"/>
    <text x="34" y="19" text-anchor="middle" fill="#FFFFFF">MIT</text>
    <rect x="76" width="64" height="28" rx="6" fill="#2563EB"/>
    <text x="108" y="19" text-anchor="middle" fill="#FFFFFF">.NET 10</text>
  </g>
</svg>
