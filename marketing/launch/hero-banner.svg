<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hero banner for the README and the tapinauth.io homepage. 1600x500 for sharp scaling.
  Shows a stylized sign-in card on the right + value props on the left.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1224"/>
      <stop offset="100%" stop-color="#0F1730"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="6" fill="url(#accent)"/>

  <!-- LEFT: brand + value props -->
  <g transform="translate(80,80)">
    <!-- logo mark -->
    <g>
      <rect width="48" height="48" fill="#2563EB"/>
      <rect x="60" width="20" height="48" fill="#22D3EE"/>
      <text x="100" y="36" fill="#F5F7FA" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="1">TapInAuth</text>
    </g>

    <text x="0" y="140" fill="#F5F7FA" font-family="Inter, system-ui, sans-serif" font-size="60" font-weight="800">Tap to sign in.</text>
    <text x="0" y="190" fill="#22D3EE" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">Drop-in passwordless auth for ASP.NET Core &amp; Blazor.</text>
    <text x="0" y="225" fill="#D8DEE9" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500">Passkeys · Magic links · Email + SMS OTP · Recovery codes · Multi-tenant.</text>

    <!-- code-block hint -->
    <g transform="translate(0,260)" font-family="Consolas, monospace" font-size="13.5" fill="#D8DEE9">
      <rect width="660" height="120" rx="10" fill="#07101F" stroke="#1F2A48" stroke-width="1"/>
      <rect width="6" height="120" rx="0" fill="#22D3EE"/>
      <text x="22" y="32" fill="#F5F7FA">builder.Services.AddTapInAuth(o =&gt; o.Methods = ...)</text>
      <text x="22" y="56" fill="#F5F7FA">    .AddEfCoreStore&lt;AppDbContext&gt;()</text>
      <text x="22" y="80" fill="#F5F7FA">    .AddSmtpEmail(builder.Configuration.GetSection("Smtp"));</text>
      <text x="22" y="104" fill="#22D3EE">app.MapTapInAuth();   // mounts /auth/* endpoints</text>
    </g>
  </g>

  <!-- RIGHT: mock sign-in card -->
  <g transform="translate(990,80)">
    <rect width="520" height="360" rx="20" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

    <!-- accent strip on top of the card -->
    <rect width="520" height="6" rx="3" fill="#2563EB"/>

    <!-- logo placeholder -->
    <g transform="translate(40,32)">
      <rect width="36" height="36" rx="8" fill="#2563EB"/>
      <text x="86" y="26" fill="#111827" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Acme</text>
    </g>

    <text x="40" y="118" fill="#111827" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">Sign in</text>
    <text x="40" y="148" fill="#6B7280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Enter your email — we'll send you a link.</text>

    <!-- passkey button -->
    <g transform="translate(40,170)">
      <rect width="440" height="44" rx="12" fill="#111827"/>
      <text x="220" y="29" text-anchor="middle" fill="#F5F7FA" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">🔑  Sign in with a passkey</text>
    </g>

    <!-- divider -->
    <line x1="40" y1="236" x2="200" y2="236" stroke="#E5E7EB" stroke-width="1"/>
    <text x="260" y="240" text-anchor="middle" fill="#6B7280" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">OR USE EMAIL</text>
    <line x1="320" y1="236" x2="480" y2="236" stroke="#E5E7EB" stroke-width="1"/>

    <!-- email input -->
    <g transform="translate(40,256)">
      <rect width="440" height="44" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
      <text x="16" y="29" fill="#9CA3AF" font-family="Inter, system-ui, sans-serif" font-size="14">you@example.com</text>
    </g>

    <!-- magic-link button -->
    <g transform="translate(40,308)">
      <rect width="440" height="44" rx="12" fill="#2563EB"/>
      <text x="220" y="29" text-anchor="middle" fill="#F5F7FA" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Email me a sign-in link</text>
    </g>
  </g>
</svg>
